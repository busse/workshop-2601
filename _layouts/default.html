<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- Open Graph (LinkedIn, Facebook, Threads) -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ site.url }}{{ '/assets/images/rvatech-2026-attendees.jpeg' | relative_url }}">
  <meta property="og:image:width" content="2048">
  <meta property="og:image:height" content="1152">
  <meta property="og:image:alt" content="Workshop attendees at a hands-on agentic coding session with Claude Code">
  <meta property="og:url" content="{{ site.url }}{{ page.url | relative_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ site.url }}{{ '/assets/images/rvatech-2026-attendees.jpeg' | relative_url }}">
  <meta name="twitter:image:alt" content="Workshop attendees at a hands-on agentic coding session with Claude Code">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<div class="campaign-banner">
  <a href="{{ '/office-hours' | relative_url }}">
    Need more help? My Q2 office hours are available for a donation to
    <strong>Blood Cancer United's Visionary of the Year</strong> campaign. &#187;
  </a>
</div>

<header class="site-header">
  <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  {% include nav.html %}
</header>

<main class="content">
  {{ content }}
</main>

<footer class="site-footer">
  <a href="mailto:cbusse@singlestoneconsulting.com">cbusse@singlestoneconsulting.com</a> ·
  <a href="https://linkedin.com/in/chrisbusse">in/chrisbusse</a> ·
  <a href="https://github.com/busse/mini-crm">mini-crm on GitHub</a> ·
  RVATech Data &amp; AI Summit 2026 ·
  <a href="https://github.com/busse/workshop-2601/blob/master/LICENSE">MIT License</a>
</footer>

</body>
</html>
