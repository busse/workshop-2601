title: "Stop Typing, Start Orchestrating"
description: "A free, hands-on agentic coding workshop with Claude Code. No signup, no catch — just learn."
url: "https://busse.github.io"
baseurl: "/workshop-2601"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
